name: Policy Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce template contract files
        run: |
          test -f contracts/template.manifest.json
          test -f contracts/reconcile.rules.yaml
          test -f Taskfile.yml
      - name: Secret-like pattern check
        run: |
          ! rg -n "(api[_-]?key|secret|password|token)\s*=\s*['\"][^'\"]+['\"]" -S . --glob '!**/.git/**'
