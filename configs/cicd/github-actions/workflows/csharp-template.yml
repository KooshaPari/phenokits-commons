name: C# Template CI

on:
  push:
    branches: [main]
    paths:
      - 'hexagonal-csharp/**'
      - '.github/workflows/csharp-template.yml'
  pull_request:
    paths:
      - 'hexagonal-csharp/**'
      - '.github/workflows/csharp-template.yml'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: hexagonal-csharp
        run: dotnet restore

      - name: Check formatting
        working-directory: hexagonal-csharp
        run: dotnet format --check --verbosity diagnostic

      - name: Build
        working-directory: hexagonal-csharp
        run: dotnet build --no-restore

      - name: Run tests
        working-directory: hexagonal-csharp
        run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage"
        if: always()

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./hexagonal-csharp/coverage/coverage.cobertura.xml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run SonarCloud scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run Roslyn Security Guard
        run: dotnet tool install --global SecurityGuard && dotnet rsg
