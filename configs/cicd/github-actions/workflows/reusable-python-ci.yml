# ─── SECURITY NOTE: SHA-pin GitHub Actions ──────────────────────────
# This is a TEMPLATE file. When consuming in a live repository, replace
# every `@v<tag>` with a pinned SHA commit + comment.
# Replace `ubuntu-latest` with a fixed runner version like `ubuntu-24.04`.
# The reusable workflow already accepts `runs-on` via its caller;
# consumers should pin the runner in their call-site.
# ─────────────────────────────────────────────────────────────────────

name: Reusable Python CI

on:
  workflow_call:
    inputs:
      package-name:
        description: 'Package name for coverage'
        type: string
        required: true
    secrets:
      CODECOV_TOKEN:
        description: 'Codecov upload token'
        required: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          uv-version: "0.5.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/

      - name: Test
        run: uv run pytest tests/ -n auto --cov=src/${{ inputs.package-name }} --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: pip install bandit && bandit -r src/ -f json -o bandit-report.json || true

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
        continue-on-error: true
