name: Security Guard

# NOTE: Billable runs disabled - use pre-commit/pre-push hooks for validation
# Uncomment below to re-enable when GitHub Actions minutes are available
# on:
#   pull_request:
#     types: [opened, synchronize, reopened]
#   push:
#     branches:
#       - "**"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"  # Weekly dry-run for audit purposes only

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run pre-commit guard checks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --hook-stage pre-commit --config .pre-commit-config.yaml --show-diff-on-failure
