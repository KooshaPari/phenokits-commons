name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  benchmark-rust:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    if: |
      !github.event.act.is_github_action ||
      contains(fromJSON('["push", "pull_request", "workflow_dispatch"]'), github.event_name)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run benchmarks
        run: cargo bench --no-run

      - name: Run and save benchmarks
        id: benchmark
        run: |
          mkdir -p benchmark-results
          cargo bench -- --noplot --notablesize json > benchmark-results/bench.json 2>&1 || true

          # Parse and format results
          if [ -f benchmark-results/bench.json ]; then
            cat benchmark-results/bench.json
          fi

      - name: Compare with main branch
        if: github.event_name == 'pull_request'
        run: |
          # Checkout main branch
          git fetch origin main
          git stash
          git checkout origin/main

          # Run benchmarks on main
          cargo bench --no-run 2>/dev/null || true
          cargo bench -- --noplot json > /tmp/main-bench.json 2>&1 || true

          # Return to current branch
          git checkout -
          git stash pop || true

          # Compare results
          if [ -f benchmark-results/bench.json ] && [ -f /tmp/main-bench.json ]; then
            echo "=== Benchmark Comparison ==="
            echo "Main branch results saved to /tmp/main-bench.json"
            echo "Current branch results saved to benchmark-results/bench.json"
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Benchmark results available at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })

  benchmark-python:
    name: Python Benchmarks
    runs-on: ubuntu-latest
    if: |
      !github.event.act.is_github_action ||
      contains(fromJSON('["push", "pull_request", "workflow_dispatch"]'), github.event_name)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Install pytest-benchmark
        run: uv add --dev pytest-benchmark

      - name: Run benchmarks
        run: |
          mkdir -p benchmark-results
          pytest benchmarks/ --benchmark-json=benchmark-results/bench.json -v || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results/
          retention-days: 30

  benchmark-regression:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    needs: [benchmark-rust, benchmark-python]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Check for regressions
        run: |
          echo "=== Benchmark Results ==="
          find artifacts -name "*.json" -exec cat {} \; 2>/dev/null | head -100

          echo ""
          echo "Note: Detailed regression analysis requires benchmark tracking infrastructure"
          echo "Consider setting up: https://github.com/rhysd/github-action-benchmark"
