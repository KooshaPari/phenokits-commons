name: Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # Daily security scan
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-rust:
    name: Rust Security
    runs-on: ubuntu-latest
    if: |
      !github.event.act.is_github_action ||
      contains(fromJSON('["push", "pull_request", "schedule", "workflow_dispatch"]'), github.event_name)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cargo-deny
        uses: cargo-bins/cargo-deny-action@v1
        with:
          command: check advisories bans licenses
          arguments: --strict

  security-python:
    name: Python Security
    runs-on: ubuntu-latest
    if: |
      !github.event.act.is_github_action ||
      contains(fromJSON('["push", "pull_request", "schedule", "workflow_dispatch"]'), github.event_name)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run pip-audit
        uses: paambaati/action-pip-audit@v5
        with:
          requirements: pyproject.toml
          fail-on: high

      - name: Run safety
        run: uvx safety check --strict || true

  security-sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/security-audit
            p/secrets
            p/embrace-redos
          upload-to-sarif: true

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  security-dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: hashFiles('package.json')
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: hashFiles('package.json')
        run: npm ci

      - name: Run npm audit
        if: hashFiles('package.json')
        run: npm audit --audit-level=high || true

      - name: Run npm outdated
        if: hashFiles('package.json')
        run: npm outdated --depth=0 || true

  security-secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v4
        with:
          args: --no-git -v

      - name: Scan for secrets
        run: |
          if command -v secretscanner &> /dev/null; then
            secretscanner scan .
          fi
