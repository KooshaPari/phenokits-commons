name: TypeScript Template CI

on:
  push:
    branches: [main]
    paths:
      - 'hexagonal-typescript/**'
      - '.github/workflows/typescript-template.yml'
  pull_request:
    paths:
      - 'hexagonal-typescript/**'
      - '.github/workflows/typescript-template.yml'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hexagonal-typescript/package-lock.json

      - name: Install dependencies
        working-directory: hexagonal-typescript
        run: npm ci

      - name: Lint with ESLint
        working-directory: hexagonal-typescript
        run: npm run lint

      - name: Check formatting
        working-directory: hexagonal-typescript
        run: npm run format -- --check

      - name: Type check
        working-directory: hexagonal-typescript
        run: npm run typecheck

      - name: Build
        working-directory: hexagonal-typescript
        run: npm run build

      - name: Run tests with Jest
        working-directory: hexagonal-typescript
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./hexagonal-typescript/coverage/lcov.info

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: hexagonal-typescript
        run: npm ci

      - name: Run npm audit
        working-directory: hexagonal-typescript
        run: npm audit --audit-level=high

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
