name: Python Template CI

on:
  push:
    branches: [main]
    paths:
      - 'hexagonal-python/**'
      - '.github/workflows/python-template.yml'
  pull_request:
    paths:
      - 'hexagonal-python/**'
      - '.github/workflows/python-template.yml'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        working-directory: hexagonal-python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: hexagonal-python
        run: ruff check src tests

      - name: Check formatting
        working-directory: hexagonal-python
        run: ruff format --check src tests

      - name: Type check with mypy
        working-directory: hexagonal-python
        run: mypy src

      - name: Run tests with pytest
        working-directory: hexagonal-python
        run: pytest tests -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./hexagonal-python/coverage.xml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run safety
        run: pip install safety && safety check -r hexagonal-python/pyproject.toml

      - name: Run pip-audit
        uses: paambaati/action-pip-audit@v5
        with:
          requirements: hexagonal-python/pyproject.toml
