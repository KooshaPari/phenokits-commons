name: CI

# NOTE: Billable runs disabled - use pre-commit/pre-push hooks for validation
# Uncomment below to re-enable when GitHub Actions minutes are available
# on:
#   pull_request:
#   push:
#     branches: [main]

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"  # Weekly dry-run for audit purposes only

# NOTE: For production use, pin every action to a specific SHA commit
# instead of a version tag. Example:
#   uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
# Replace ubuntu-latest with a pinned runner version:
#   runs-on: ubuntu-24.04

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    # DISABLED: if: false  # Uncomment when billing is available
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest and reconcile rules
        run: |
          test -f contracts/template.manifest.json
          test -f contracts/reconcile.rules.yaml
          bash scripts/scaffold-smoke.sh
