# Reusable Rust CI Workflow
# Usage in your project:
#   jobs:
#     ci:
#       uses: KooshaPari/template-commons/.github/workflows/reusable-rust-ci.yml@main
#       with:
#         crate-name: my-crate
#         rust-version: stable

name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      crate-name:
        description: 'Name of the crate to build'
        required: true
        type: string
      rust-version:
        description: 'Rust version to use'
        required: false
        type: string
        default: 'stable'
      runs-on:
        description: 'Runner to use'
        required: false
        type: string
        default: 'ubuntu-24.04'
      enable-coverage:
        description: 'Enable coverage reporting'
        required: false
        type: boolean
        default: true
      enable-security:
        description: 'Enable security audit'
        required: false
        type: boolean
        default: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2 # nextest

      - name: Cache dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: .

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test with nextest
        run: cargo nextest run --workspace --all-targets

      - name: Check documentation
        run: cargo test --doc --workspace

  coverage:
    name: Code Coverage
    runs-on: ${{ inputs.runs-on }}
    if: ${{ inputs.enable-coverage }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2 # llvm-cov

      - name: Cache dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./lcov.info
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ${{ inputs.runs-on }}
    if: ${{ inputs.enable-security }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run cargo audit
        uses: rustsec/audit-check@dd51754d4e59da7395a4cd9b593f0ff2d61a9b95 # v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@6261f5cd38e133cdcf00c23e3943f3e9d012d538 # main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true
