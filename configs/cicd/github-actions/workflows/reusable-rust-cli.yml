name: Reusable Rust CLI CI

on:
  workflow_call:
    inputs:
      crate-name:
        description: 'Name of the Rust crate'
        required: true
        type: string
      rust-version:
        description: 'Rust version to use'
        default: 'stable'
        type: string
      targets:
        description: 'JSON array of target triples'
        default: '["x86_64-unknown-linux-gnu", "x86_64-apple-darwin"]'
        type: string
      features:
        description: 'Features to enable'
        default: ''
        type: string
      runs-on:
        description: 'Runner OS'
        default: 'ubuntu-latest'
        type: string
    secrets:
      token:
        description: 'GitHub token'
        required: false

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt, clippy
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run tests
        run: cargo test --verbose

  build-matrix:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.crate-name }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ inputs.crate-name }}*

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"
      
      - name: Audit dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.token || github.token }}
