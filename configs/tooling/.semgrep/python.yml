# Semgrep configuration for Python projects

rules:
  # Security rules
  - id: subprocess-shell-true
    pattern: |
      subprocess.run(..., shell=True, ...)
    message: "shell=True is dangerous with untrusted input."
    languages: [python]
    severity: WARNING
    metadata:
      category: security

  - id: yaml-unsafe-load
    pattern: yaml.load(...)
    message: "yaml.load() without Loader is unsafe. Use yaml.safe_load()."
    languages: [python]
    severity: ERROR
    metadata:
      category: security

  - id: hardcoded-password
    pattern-regex: (password|passwd|pwd)\s*=\s*["'][^"']+["']
    message: "Possible hardcoded password."
    languages: [python]
    severity: WARNING
    metadata:
      category: security

  # Best practices
  - id: bare-except
    pattern: |
      except:
        ...
    message: "Avoid bare except. Catch specific exceptions."
    languages: [python]
    severity: WARNING
    metadata:
      category: best-practice

  - id: print-in-production
    pattern: print(...)
    message: "print() should use logging in production."
    languages: [python]
    severity: INFO
    metadata:
      category: best-practice
