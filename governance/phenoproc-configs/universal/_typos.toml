# Typos configuration for universal spell checking
# Template: phenotype-governance

[default]
# Don't check binary files
binary = false

[files]
# Exclude directories
extend-exclude = [
    "node_modules/",
    "target/",
    "dist/",
    "*.min.js",
    "*.min.css",
    ".git/",
]

[default.extend-words]
# Don't correct these words (project-specific)
