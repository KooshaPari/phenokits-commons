# Pre-commit hooks for config-kit
# These hooks run automatically when committing

repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=88]
        files: \.(py|pyi)$

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]
        files: \.(py|pyi)$

  - repo: https://github.com/pycqa/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: \.(py|pyi)$
      - id: ruff-format
        args: [--check]
        files: \.(py|pyi)$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [types-all]
        args: [--ignore-missing-imports, --show-error-codes]
        files: \.(py|pyi)$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-r, src, -f, json]
        files: \.(py|pyi)$
        exclude: ^tests/

  - repo: https://github.com/PyCQA/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, relaxed]
        files: \.(yaml|yml)$

  - repo: https://github.com/PyCQA/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [-c, .markdownlint.json]
        files: \.(md|markdown)$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-e, SC1091]
        files: \.(sh|bash|zsh)$

  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--convention=google]
        files: \.(py|pyi)$
        exclude: ^tests/

  - repo: https://github.com/pycqa/docformatter
    rev: v1.7.5
    hooks:
      - id: docformatter
        args: [--in-place, --wrap-summaries=88, --wrap-descriptions=88]
        files: \.(py|pyi)$
        exclude: ^tests/

  - repo: https://github.com/econchick/interrogate
    rev: 1.5.0
    hooks:
      - id: interrogate
        args: [--verbose, --ignore-init-method, --ignore-init-module, --fail-under=80]
        files: \.(py|pyi)$
        exclude: ^tests/

  - repo: https://github.com/jakewharton/pygradle-precommit
    rev: 1.0.2
    hooks:
      - id: pyupgrade
        args: [--py37-plus, --keep-runtime-typing]
        files: \.(py|pyi)$

  - repo: local
    hooks:
      - id: safety-check
        name: Safety check
        entry: safety
        language: system
        args: [check, --json, --file, safety_report.json]
        pass_filenames: false
        always_run: true

      - id: shellcheck-fix
        name: Shellcheck (fix)
        entry: shellcheck
        language: system
        args: [-e, SC1091, -f, gcc]
        files: \.(sh|bash|zsh)$

      - id: yamllint-fix
        name: YAMLLint (fix)
        entry: yamllint
        language: system
        args: [-d, relaxed, -f]
        files: \.(yaml|yml)$

      - id: pre-commit-hooks
        name: Pre-commit hooks
        entry: bash
        language: system
        args: [linting/git-hooks/pre-commit]
        files: \.(py|pyi|yaml|yml|md|sh)$

      - id: commit-message-check
        name: Commit message check
        entry: bash
        language: system
        args: [linting/git-hooks/commit-msg]
        files: ^COMMIT_EDITMSG$^
