[tool.ruff]
line-length = 88
target-version = "py311"
fix = true

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
    "ARG001", # unused arguments in functions
    "ARG002", # unused arguments in methods
    "ARG005", # unused arguments in lambda functions
]

ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "W191",  # indentation contains tabs
    "B904",  # Allow raising exceptions without from e, for HTTPException
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ARG001", "ARG002"]
"__init__.py" = ["F401"]

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = true

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["config_kit"]
force_single_line = false
combine_as_imports = true
include_trailing_comma = true

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "pytest.*",
    "pytest_asyncio.*",
    "bandit.*",
    "safety.*",
    "shellcheck.*",
    "yamllint.*",
    "markdownlint.*",
    "lychee.*",
    "pre_commit.*",
    "vulture.*",
    "radon.*",
    "pyupgrade.*",
    "docformatter.*",
    "pydocstyle.*",
    "interrogate.*",
    "detect_secrets.*",
    "semgrep.*",
    "trivy.*",
    "mkdocs.*",
    "allure.*",
    "locust.*",
    "memory_profiler.*",
    "playwright.*",
    "lychee.*",
]
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests", "test"]
skips = ["B101"]  # assert_used

[tool.safety]
check-authored = true
check-only = false
json-report = true
output = "safety_report.json"

[tool.yamllint]
extends = "default"

[tool.yamllint.rules]
line-length = { max = 88, level = "warning" }
indentation = { indent-sequences = true, check-multi-line-strings = false }

[tool.markdownlint]
MD001 = false
MD013 = {line_length = 88}
MD024 = {allow_different_nesting = true}
MD033 = false
MD034 = false
MD036 = false
MD037 = false
MD038 = false
MD039 = false
MD040 = false
MD041 = false
MD042 = false
MD043 = false
MD044 = false
MD045 = false
MD046 = false
MD047 = false
MD048 = {level = "warning"}
MD049 = {level = "warning"}
MD050 = {level = "warning"}
MD051 = {level = "warning"}
MD052 = {level = "warning"}
MD053 = {level = "warning"}
MD054 = {level = "warning"}

[tool.pydocstyle]
convention = "google"
add-ignore = ["D100", "D104", "D107"]
match = "(?!test_).*\\.py"
match-dir = "(?!tests).*"

[tool.interrogate]
ignore-init-method = true
ignore-init-module = false
ignore-magic = false
ignore-nested-functions = false
ignore-private = true
ignore-property-decorators = true
ignore-module = false
fail-under = 80
exclude = ["tests", "test"]
verbose = 1
quiet = false
whitelist-names = []
whitelist-regex = []
color = true
omit-covered-files = false

[tool.pyupgrade]
keep-runtime-typing = true

[tool.docformatter]
wrap-summaries = 88
wrap-descriptions = 88
blank-after-summary = false
pre-summary-newline = false
make-summary-multi-line = false
close-quotes-on-newline = false

[tool.radon]
cc-max = 10
max-complexity = 10
min-a = 0
show-closures = false
exclude = ["tests/*"]

[tool.vulture]
min_confidence = 80
verbose = false
make_whitelist = false
paths = ["src"]
exclude = ["tests/*"]
