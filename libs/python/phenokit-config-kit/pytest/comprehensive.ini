[pytest]
# Comprehensive pytest configuration for enterprise projects
minversion = 7.4
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Comprehensive options
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --maxfail=10
    --durations=10
    --durations-min=2.0
    --cache-clear
    # Parallel execution
    -n auto
    --dist=loadscope
    # Coverage analysis
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=json:coverage.json
    --cov-fail-under=80
    --cov-branch
    # JUnit XML for CI integration
    --junitxml=reports/pytest-junit.xml

# Comprehensive markers
markers =
    # Test types
    unit: Unit tests (fast, isolated, no I/O, <1s per test)
    integration: Integration tests (slower, may use I/O, require services)
    e2e: End-to-end tests (slowest, full system workflows)
    smoke: Smoke tests for quick validation
    regression: Comprehensive regression coverage
    
    # Performance markers
    fast: Fast running tests (< 1 second)
    slow: Slow running tests (> 5 seconds)
    performance: Performance and benchmarking tests
    benchmark: Performance benchmark tests
    memory: Memory usage and leak tests
    concurrency: Tests for concurrent operations
    
    # Architecture markers
    domain: Domain layer tests (business logic)
    application: Application layer tests (use cases)
    adapters: Adapter layer tests (external interfaces)
    infrastructure: Infrastructure layer tests
    
    # Execution markers
    parallel: Tests that can run in parallel
    serial: Tests that must run serially
    critical: Critical path tests for PR validation
    flaky: Tests that may be flaky and need retry
    
    # Service markers
    external: Tests requiring external services (skip in CI)
    database: Database interaction tests
    cache: Cache tests
    message_broker: Message broker tests
    http: HTTP server functionality tests
    websocket: WebSocket communication tests
    api: HTTP API level tests
    
    # Security and compliance
    security: Security-related tests
    auth: Authentication and authorization checks
    rls: Tests that validate RLS policies
    compliance: Compliance and regulatory tests
    
    # Quality markers
    error_handling: Tests focused on error scenarios
    edge_case: Tests for boundary conditions
    timeout: Sets timeout for test execution
    contract: Contract validation for external interfaces
    
    # Workflow markers
    workflow: Tests for multi-step workflows
    migration: Schema/config migration validation
    compatibility: Backwards/forwards compatibility coverage
    
    # Provider-specific markers
    tool_specific: Tests specific to individual tools
    provider_specific: Tests specific to AI model providers
    oauth: Tests for OAuth2/authentication flows
    mcp: Tests for MCP protocol compliance
    
    # Test execution order
    order: Test execution order (pytest-ordering plugin)
    dependency: Test dependencies (pytest-dependency plugin)
    
    # Environment markers
    ci: Tests that should run in CI
    local: Tests that should run locally
    dev: Development environment tests
    prod: Production environment tests
    
    # Skip conditions
    skip_if_no_oauth: Skip if OAuth not available
    skip_if_no_redis: Skip if Redis not available
    skip_if_no_nats: Skip if NATS not available
    skip_if_no_temporal: Skip if Temporal not available

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Comprehensive warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:pydantic.*
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning
    ignore:.*coroutine.*never awaited:RuntimeWarning
    ignore:.*Task was destroyed.*:RuntimeWarning
    ignore::pytest.PytestAssertRewriteWarning
    ignore:cannot collect test class .* because it has a __init__ constructor:pytest.PytestCollectionWarning

# Timeout settings
timeout = 300
timeout_method = "thread"

# Logging settings
log_cli = true
log_cli_level = INFO
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

# JUnit XML configuration
junit_family = "xunit2"
junit_logging = "system-out"
junit_log_passing_tests = false