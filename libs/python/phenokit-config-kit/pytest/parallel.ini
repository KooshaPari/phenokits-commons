[pytest]
# Parallel execution configuration for different scenarios
minversion = 7.4
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# === PARALLEL EXECUTION PROFILES ===

# Fast unit tests only (no external dependencies)
# Usage: pytest --ini=pytest-parallel.ini -m "fast and not slow and not serial"
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --strict-config
    --maxfail=3
    --durations=5
    --durations-min=1.0
    -n auto
    --dist=loadscope

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Warnings for parallel execution
filterwarnings =
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:pydantic.*

# Parallel execution markers
markers =
    fast: marks tests as fast unit tests (< 2s, no external deps, parallel-safe)
    unit: marks tests as isolated unit tests (fast, no external dependencies)
    integration: marks tests as integration tests that make real API calls
    slow: marks tests as slow or long-running (>5 seconds)
    serial: marks tests that must run serially due to shared resources
    benchmark: marks performance/throughput benchmark tests
    no_mock_provider: requires real provider calls (no mocks)
    redis: tests that require Redis connection (serial)
    nats: tests that require NATS messaging (serial)
    oauth: tests for OAuth2/authentication flows
    http: tests for HTTP server functionality
    websocket: tests for WebSocket communication
    mcp: tests for MCP protocol compliance
    tool_specific: tests specific to individual tools
    provider_specific: tests specific to AI model providers
    workflow: tests for multi-step workflows
    security: security-related tests
    performance: performance testing and optimization
    memory: memory usage and leak tests
    concurrency: tests for concurrent operations
    error_handling: tests focused on error scenarios
    edge_case: tests for boundary conditions and edge cases
    timeout: sets timeout for test execution

# === EXECUTION COMMANDS ===
# Fast parallel tests: pytest -m "fast and not serial" -n auto
# All unit tests parallel: pytest -m "unit and not serial" -n auto --maxfail=5
# Serial tests only: pytest -m "serial" -n 0
# Integration tests: pytest -m "integration" -n 4 --maxfail=2
# All tests with grouping: pytest -n auto --dist=worksteal --maxfail=10