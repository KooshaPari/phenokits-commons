[pytest]
# Performance testing configuration
minversion = 7.4
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Performance testing options
addopts =
    -v
    --tb=short
    --strict-markers
    --maxfail=5
    --durations=20
    --durations-min=0.1
    # Performance-specific options
    --benchmark-only
    --benchmark-sort=mean
    --benchmark-skip
    --benchmark-save=performance_results
    --benchmark-save-data
    # Memory profiling
    --profile
    --profile-svg
    # Coverage for performance tests
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Performance testing markers
markers =
    benchmark: Performance benchmark tests
    performance: Performance testing and optimization
    memory: Memory usage and leak tests
    concurrency: Tests for concurrent operations
    load: High concurrency load scenarios
    stress: Stress testing under extreme conditions
    profiling: Tests that require profiling
    slow: Slow running tests (> 5 seconds)
    fast: Fast running tests (< 1 second)
    unit: Unit tests (fast, isolated, no I/O)
    integration: Integration tests (slower, may use I/O)

# Performance-specific warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pytest_benchmark
    ignore::UserWarning:memory_profiler

# Timeout settings for performance tests
timeout = 600
timeout_method = "thread"

# Logging for performance analysis
log_cli = true
log_cli_level = INFO
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"