[pytest]
# CI/CD Profile - Comprehensive validation with optimized parallel execution
minversion = 7.4
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# CI/CD-optimized options
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=10
    --durations=10
    --durations-min=1.0
    --cache-clear
    # Parallel execution optimized for CI
    -n auto
    --dist=worksteal
    # Include integration tests but exclude external service dependencies
    -m "not external and not nats and not redis and not temporal"
    # Coverage reporting
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=85
    # JUnit XML for CI integration
    --junitxml=reports/pytest-junit.xml

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# CI-specific markers
markers =
    fast: Fast unit tests (< 1 second execution)
    slow: Slow integration tests (> 5 seconds execution)
    critical: Critical path tests for PR validation
    external: Tests requiring external services (skip in CI)
    unit: Pure unit tests with mocks
    integration: Integration tests with real services
    benchmark: Performance benchmark tests
    tool_specific: Tests specific to individual tools
    provider_specific: Tests specific to AI model providers
    workflow: Tests for multi-step workflows
    security: Security-related tests
    performance: Performance testing and optimization
    memory: Memory usage and leak tests
    concurrency: Tests for concurrent operations
    error_handling: Tests focused on error scenarios
    edge_case: Tests for boundary conditions
    flaky: Tests that may be flaky and need retry
    nats: Tests requiring NATS messaging
    redis: Tests requiring Redis connection
    temporal: Tests requiring Temporal workflow
    oauth: Tests for OAuth2/authentication flows
    http: Tests for HTTP server functionality
    websocket: Tests for WebSocket communication
    mcp: Tests for MCP protocol compliance

# CI-friendly warnings (stricter than dev)
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:pydantic.*
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning
    ignore:.*coroutine.*never awaited:RuntimeWarning
    ignore:.*Task was destroyed.*:RuntimeWarning

# CI timeout settings
timeout = 300
timeout_method = "thread"

# CI logging settings
log_cli = false
log_cli_level = WARNING
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

# JUnit XML configuration
junit_family = "xunit2"
junit_logging = "system-out"
junit_log_passing_tests = false