[pytest]
# Security testing configuration
minversion = 7.4
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Security testing options
addopts =
    -v
    --tb=short
    --strict-markers
    --maxfail=5
    --durations=10
    --durations-min=1.0
    # Security-specific options
    --bandit
    --bandit-config=.bandit
    --safety
    --safety-json
    # Coverage for security tests
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Security testing markers
markers =
    security: Security-related tests
    auth: Authentication and authorization checks
    rls: Tests that validate RLS policies
    compliance: Compliance and regulatory tests
    vulnerability: Vulnerability testing
    penetration: Penetration testing
    injection: Injection attack testing
    xss: Cross-site scripting testing
    csrf: Cross-site request forgery testing
    sql_injection: SQL injection testing
    authentication: Authentication testing
    authorization: Authorization testing
    encryption: Encryption testing
    hashing: Hashing testing
    jwt: JWT token testing
    oauth: OAuth2/authentication flows
    session: Session management testing
    input_validation: Input validation testing
    output_encoding: Output encoding testing
    error_handling: Security error handling
    logging: Security logging testing
    audit: Security audit testing
    unit: Unit tests (fast, isolated, no I/O)
    integration: Integration tests (slower, may use I/O)

# Security-specific warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:bandit
    ignore::UserWarning:safety

# Timeout settings for security tests
timeout = 300
timeout_method = "thread"

# Logging for security analysis
log_cli = true
log_cli_level = WARNING
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"