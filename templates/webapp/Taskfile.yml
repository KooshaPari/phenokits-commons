version: '3'

tasks:
  default:
    cmds:
      - task --list
    silent: true

  check:
    cmds:
      - task: quality

  quality:
    cmds:
      - test -f contracts/template.manifest.json
      - test -f contracts/reconcile.rules.yaml
      - ./scripts/scaffold-smoke.sh

  release:prep:
    cmds:
      - task: check
