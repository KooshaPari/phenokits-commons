name: Dependency Policy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.18.3 --locked
      - name: Run cargo-deny
        run: cargo deny check

  cargo-audit:
    name: RustSec advisory database (rustsec/audit-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.21.2 --locked
      - name: Run cargo audit
        run: cargo audit

  govulncheck-fwd-compat:
    name: govulncheck (forward-compat; skipped if no Go)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 # v5.0.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: |
          if [ ! -f go.mod ]; then
            echo "::notice::No go.mod — skipping govulncheck (forward-compat guard)."
            exit 0
          fi
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
